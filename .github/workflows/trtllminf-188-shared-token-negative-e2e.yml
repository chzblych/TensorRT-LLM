name: TRTLLMINF-188 Shared Token Negative E2E

"on":
  workflow_dispatch:
    inputs:
      confirmation:
        description: Enter TRTLLMINF-188-UPSTREAM-NEGATIVE-E2E
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: trtllminf-188-upstream-negative-e2e
  cancel-in-progress: false

jobs:
  negative-actor-regression:
    if: >-
      github.repository == 'chzblych/TensorRT-LLM' &&
      github.actor == 'chzblych' &&
      github.triggering_actor == 'chzblych' &&
      github.ref == 'refs/heads/main' &&
      github.run_attempt == 1 &&
      inputs.confirmation == 'TRTLLMINF-188-UPSTREAM-NEGATIVE-E2E'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TARGET_REPOSITORY: NVIDIA/TensorRT-LLM
      TARGET_PR: "16575"
      TARGET_PR_ID: "4085613939"
      TARGET_PR_NODE_ID: PR_kwDOKH5No87zhYVz
      TARGET_PR_TITLE: "[TRTLLMINF-188][test] Validate merged post-merge approval workflow"
      TARGET_AUTHOR: chzblych
      TARGET_AUTHOR_ID: "20898724"
      TARGET_BASE_REPOSITORY_ID: "679366051"
      TARGET_BASE_SHA: 3124bb3525e6e2ad285ba7c22ddc0dbc236521dc
      TARGET_HEAD_REPOSITORY_ID: "953399424"
      TARGET_HEAD_REF: trtllminf-188-upstream-guard-e2e-20260719
      TARGET_HEAD_SHA: 8ab204537a813908874e732e3395c91438d82b16
      TARGET_CREATED_AT: "2026-07-19T11:06:29Z"
      TARGET_UPDATED_AT: "2026-07-19T11:18:34Z"
      TARGET_CLOSED_AT: "2026-07-19T11:18:34Z"
      TARGET_MARKER_PATH: .github/TRTLLMINF-188-WORKFLOW-TEST.md
      TARGET_MARKER_BLOB_SHA: 11af1b53f6f43b84818c23794f6b8369fb5328dc
      APPROVAL_LABEL: "ci: post-merge approved"
      EXPECTED_ACTOR: trtllm-agent
      EXPECTED_ACTOR_ID: "296075020"
      GITHUB_ACTIONS_BOT_ID: "41898282"
      BASELINE_ASSIGNED_EVENT_ID: "28178236762"
      BASELINE_LABELED_EVENT_ID: "28178248605"
      BASELINE_UNLABELED_EVENT_ID: "28178377465"
      BASELINE_CLOSED_EVENT_ID: "28178400312"
      BASELINE_GUARD_RUN_ID: "29684572583"
      GUARD_WORKFLOW_ID: "316115479"
      GUARD_WORKFLOW_PATH: .github/workflows/post-merge-approval.yml
      GUARD_WORKFLOW_BLOB_SHA: 66b3490843dd3a0e42d840603acd9af2f374d2ff
      LLM_API_WORKFLOW_ID: "276247466"
      LLM_API_WORKFLOW_PATH: .github/workflows/llm-api-compatibility.yml
      LLM_API_WORKFLOW_BLOB_SHA: e93fea709ef93e8d370010e81d60ca0c774f3adb
      BLOSSOM_WORKFLOW_ID: "130486219"
      BLOSSOM_WORKFLOW_PATH: .github/workflows/blossom-ci.yml
      BLOSSOM_WORKFLOW_BLOB_SHA: f5a60658d8ddffad0078e7164598fe5cd84abb4d
      BOT_WORKFLOW_ID: "153244436"
      BOT_WORKFLOW_PATH: .github/workflows/bot-command.yml
      BOT_WORKFLOW_BLOB_SHA: 56018b3559a10b1563567de70b4285a8c997155b
      AUDIT_DIR: /tmp/trtllminf-188-shared-token-negative-e2e

    steps:
      - name: Validate one-shot baseline and token identity
        id: preflight
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_DIR"

          identity="$(gh api /user)"
          jq -e \
            --arg login "$EXPECTED_ACTOR" \
            --argjson id "$EXPECTED_ACTOR_ID" \
            '.login == $login and .id == $id and .type == "User"' \
            <<<"$identity" >/dev/null

          repository_access="$(gh api "/repos/$TARGET_REPOSITORY")"
          jq -e \
            --argjson repo_id "$TARGET_BASE_REPOSITORY_ID" \
            '.id == $repo_id and .full_name == "NVIDIA/TensorRT-LLM" and
             .permissions.triage == true and .permissions.pull == true and
             .permissions.push == false and .permissions.admin == false' \
            <<<"$repository_access" >/dev/null

          approved_membership="$(
            gh api "/orgs/NVIDIA/teams/trt-llm-ci-approvers/memberships/chzblych"
          )"
          jq -e '.state == "active"' \
            <<<"$approved_membership" >/dev/null
          set +e
          denied_membership="$(
            gh api --include \
              "/orgs/NVIDIA/teams/trt-llm-ci-approvers/memberships/$EXPECTED_ACTOR" \
              2>&1
          )"
          denied_status=$?
          set -e
          [[ "$denied_status" -ne 0 ]]
          grep -q 'HTTP 404' <<<"$denied_membership"

          pr="$(gh api "/repos/$TARGET_REPOSITORY/pulls/$TARGET_PR")"
          jq -e \
            --argjson pr_id "$TARGET_PR_ID" \
            --arg node_id "$TARGET_PR_NODE_ID" \
            --arg title "$TARGET_PR_TITLE" \
            --arg author "$TARGET_AUTHOR" \
            --argjson author_id "$TARGET_AUTHOR_ID" \
            --argjson base_repo_id "$TARGET_BASE_REPOSITORY_ID" \
            --arg base_sha "$TARGET_BASE_SHA" \
            --argjson head_repo_id "$TARGET_HEAD_REPOSITORY_ID" \
            --arg head_ref "$TARGET_HEAD_REF" \
            --arg head_sha "$TARGET_HEAD_SHA" \
            --arg created_at "$TARGET_CREATED_AT" \
            --arg updated_at "$TARGET_UPDATED_AT" \
            --arg closed_at "$TARGET_CLOSED_AT" \
            '.id == $pr_id and .node_id == $node_id and .number == 16575 and
             .state == "closed" and .merged == false and .draft == true and
             .title == $title and .user.login == $author and .user.id == $author_id and
             .base.ref == "main" and .base.sha == $base_sha and
             .base.repo.full_name == "NVIDIA/TensorRT-LLM" and .base.repo.id == $base_repo_id and
             .head.ref == $head_ref and .head.sha == $head_sha and
             .head.repo.full_name == "chzblych/TensorRT-LLM" and .head.repo.id == $head_repo_id and
             .created_at == $created_at and .updated_at == $updated_at and
             .closed_at == $closed_at and .comments == 0 and (.labels | length) == 0' \
            <<<"$pr" >/dev/null

          issue="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR")"
          jq -e '.state == "closed" and .comments == 0 and (.labels | length) == 0' \
            <<<"$issue" >/dev/null

          events="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100")"
          jq -e \
            --argjson assigned "$BASELINE_ASSIGNED_EVENT_ID" \
            --argjson labeled "$BASELINE_LABELED_EVENT_ID" \
            --argjson unlabeled "$BASELINE_UNLABELED_EVENT_ID" \
            --argjson closed "$BASELINE_CLOSED_EVENT_ID" \
            'length == 4 and
             .[0].id == $assigned and .[0].event == "assigned" and
             .[1].id == $labeled and .[1].event == "labeled" and
               .[1].label.name == "ci: post-merge approved" and
             .[2].id == $unlabeled and .[2].event == "unlabeled" and
               .[2].label.name == "ci: post-merge approved" and
             .[3].id == $closed and .[3].event == "closed"' \
            <<<"$events" >/dev/null

          comments="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/comments?per_page=100")"
          jq -e 'length == 0' <<<"$comments" >/dev/null

          files="$(gh api "/repos/$TARGET_REPOSITORY/pulls/$TARGET_PR/files?per_page=100")"
          jq -e \
            --arg path "$TARGET_MARKER_PATH" \
            --arg sha "$TARGET_MARKER_BLOB_SHA" \
            'length == 1 and .[0].filename == $path and .[0].status == "added" and
             .[0].sha == $sha and .[0].changes == 11' \
            <<<"$files" >/dev/null

          for spec in \
            "$GUARD_WORKFLOW_ID|$GUARD_WORKFLOW_PATH|$GUARD_WORKFLOW_BLOB_SHA" \
            "$LLM_API_WORKFLOW_ID|$LLM_API_WORKFLOW_PATH|$LLM_API_WORKFLOW_BLOB_SHA" \
            "$BLOSSOM_WORKFLOW_ID|$BLOSSOM_WORKFLOW_PATH|$BLOSSOM_WORKFLOW_BLOB_SHA" \
            "$BOT_WORKFLOW_ID|$BOT_WORKFLOW_PATH|$BOT_WORKFLOW_BLOB_SHA"; do
            IFS='|' read -r workflow_id workflow_path workflow_blob <<<"$spec"
            workflow="$(gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$workflow_id")"
            jq -e \
              --argjson id "$workflow_id" \
              --arg path "$workflow_path" \
              '.id == $id and .path == $path and .state == "active"' \
              <<<"$workflow" >/dev/null
            observed_blob="$(
              gh api "/repos/$TARGET_REPOSITORY/contents/$workflow_path?ref=main" --jq '.sha'
            )"
            [[ "$observed_blob" == "$workflow_blob" ]]
          done

          guard_runs="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$GUARD_WORKFLOW_ID/runs?event=pull_request_target&per_page=100"
          )"
          jq -e \
            --argjson baseline "$BASELINE_GUARD_RUN_ID" \
            --arg title "$TARGET_PR_TITLE" \
            '[.workflow_runs[] | select(.display_title == $title)] |
             length == 1 and .[0].id == $baseline and
             .[0].status == "completed" and .[0].conclusion == "success"' \
            <<<"$guard_runs" >/dev/null

          printf '%s\n' \
            "guard_run_ids=$(jq -c '[.workflow_runs[].id]' <<<"$guard_runs")" \
            >> "$GITHUB_OUTPUT"
          llm_api_runs="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$LLM_API_WORKFLOW_ID/runs?event=pull_request&per_page=100"
          )"
          printf '%s\n' \
            "llm_api_run_ids=$(jq -c '[.workflow_runs[].id]' <<<"$llm_api_runs")" \
            >> "$GITHUB_OUTPUT"
          for entry in \
            "blossom|$BLOSSOM_WORKFLOW_ID" \
            "bot|$BOT_WORKFLOW_ID"; do
            IFS='|' read -r output_name workflow_id <<<"$entry"
            issue_comment_runs="$(
              gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$workflow_id/runs?event=issue_comment&per_page=100"
            )"
            printf '%s\n' \
              "${output_name}_run_ids=$(jq -c '[.workflow_runs[].id]' <<<"$issue_comment_runs")" \
              >> "$GITHUB_OUTPUT"
          done

          jq -n \
            --arg token_actor "$EXPECTED_ACTOR" \
            --argjson token_actor_id "$EXPECTED_ACTOR_ID" \
            --arg role_name "triage (authenticated repository permissions)" \
            --arg approved_probe "chzblych:active" \
            --arg denied_probe "$EXPECTED_ACTOR:404" \
            --arg pr_url "$(jq -r '.html_url' <<<"$pr")" \
            --arg guard_blob "$GUARD_WORKFLOW_BLOB_SHA" \
            '{token_actor:$token_actor,token_actor_id:$token_actor_id,role_name:$role_name,
              team_membership_probe:{approved:$approved_probe,denied:$denied_probe},
              target_pr:$pr_url,guard_blob_sha:$guard_blob}' \
            > "$AUDIT_DIR/preflight.json"

      - name: Revalidate and add approval label as non-approver user
        id: mutate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
        run: |
          set -euo pipefail

          pr="$(gh api "/repos/$TARGET_REPOSITORY/pulls/$TARGET_PR")"
          issue="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR")"
          events="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100")"
          files="$(gh api "/repos/$TARGET_REPOSITORY/pulls/$TARGET_PR/files?per_page=100")"
          guard_blob="$(
            gh api "/repos/$TARGET_REPOSITORY/contents/$GUARD_WORKFLOW_PATH?ref=main" --jq '.sha'
          )"
          llm_api_blob="$(
            gh api "/repos/$TARGET_REPOSITORY/contents/$LLM_API_WORKFLOW_PATH?ref=main" --jq '.sha'
          )"
          blossom_blob="$(
            gh api "/repos/$TARGET_REPOSITORY/contents/$BLOSSOM_WORKFLOW_PATH?ref=main" --jq '.sha'
          )"
          bot_blob="$(
            gh api "/repos/$TARGET_REPOSITORY/contents/$BOT_WORKFLOW_PATH?ref=main" --jq '.sha'
          )"
          identity="$(gh api /user)"
          repository_access="$(gh api "/repos/$TARGET_REPOSITORY")"

          jq -e \
            --argjson id "$TARGET_PR_ID" \
            --arg updated_at "$TARGET_UPDATED_AT" \
            '.id == $id and .state == "closed" and .merged == false and .draft == true and
             .updated_at == $updated_at and .comments == 0 and (.labels | length) == 0' \
            <<<"$pr" >/dev/null
          jq -e '.comments == 0 and (.labels | length) == 0' <<<"$issue" >/dev/null
          jq -e --argjson closed "$BASELINE_CLOSED_EVENT_ID" \
            'length == 4 and .[-1].id == $closed and .[-1].event == "closed"' \
            <<<"$events" >/dev/null
          jq -e \
            --arg path "$TARGET_MARKER_PATH" \
            --arg sha "$TARGET_MARKER_BLOB_SHA" \
            'length == 1 and .[0].filename == $path and .[0].sha == $sha' \
            <<<"$files" >/dev/null
          jq -e \
            --arg login "$EXPECTED_ACTOR" \
            --argjson id "$EXPECTED_ACTOR_ID" \
            '.login == $login and .id == $id' <<<"$identity" >/dev/null
          jq -e \
            --argjson repo_id "$TARGET_BASE_REPOSITORY_ID" \
            '.id == $repo_id and .permissions.triage == true and
             .permissions.pull == true and .permissions.push == false and
             .permissions.admin == false' \
            <<<"$repository_access" >/dev/null
          [[ "$guard_blob" == "$GUARD_WORKFLOW_BLOB_SHA" ]]
          [[ "$llm_api_blob" == "$LLM_API_WORKFLOW_BLOB_SHA" ]]
          [[ "$blossom_blob" == "$BLOSSOM_WORKFLOW_BLOB_SHA" ]]
          [[ "$bot_blob" == "$BOT_WORKFLOW_BLOB_SHA" ]]
          gh api "/orgs/NVIDIA/teams/trt-llm-ci-approvers/memberships/chzblych" \
            --jq '.state' | grep -qx 'active'
          set +e
          denied_membership="$(
            gh api --include \
              "/orgs/NVIDIA/teams/trt-llm-ci-approvers/memberships/$EXPECTED_ACTOR" \
              2>&1
          )"
          denied_status=$?
          set -e
          [[ "$denied_status" -ne 0 ]]
          grep -q 'HTTP 404' <<<"$denied_membership"

          mutation_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '%s\n' \
            'mutation_attempted=true' \
            "mutation_at=$mutation_at" \
            >> "$GITHUB_OUTPUT"

          response="$(
            jq -n --arg label "$APPROVAL_LABEL" '{labels:[$label]}' |
              gh api --method POST \
                "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/labels" --input -
          )"
          jq -e --arg label "$APPROVAL_LABEL" \
            '[.[].name] | index($label) != null' <<<"$response" >/dev/null

          label_event=''
          for _attempt in $(seq 1 30); do
            events="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100")"
            candidates="$(
              jq -c \
                --arg label "$APPROVAL_LABEL" \
                --arg actor "$EXPECTED_ACTOR" \
                --argjson actor_id "$EXPECTED_ACTOR_ID" \
                --arg since "$mutation_at" \
                --argjson baseline "$BASELINE_LABELED_EVENT_ID" \
                '[.[] | select(.id != $baseline and .event == "labeled" and
                  .label.name == $label and .actor.login == $actor and
                  .actor.id == $actor_id and .actor.type == "User" and
                  .created_at >= $since)]' <<<"$events"
            )"
            if [[ "$(jq 'length' <<<"$candidates")" == "1" ]]; then
              label_event="$(jq -c '.[0]' <<<"$candidates")"
              break
            fi
            sleep 1
          done
          [[ -n "$label_event" ]]

          printf '%s\n' \
            "label_event_id=$(jq -r '.id' <<<"$label_event")" \
            "label_event_created_at=$(jq -r '.created_at' <<<"$label_event")" \
            >> "$GITHUB_OUTPUT"
          jq '{id,event,actor:{login:.actor.login,id:.actor.id,type:.actor.type},label,created_at}' \
            <<<"$label_event" > "$AUDIT_DIR/label-event.json"

      - name: Verify fail-closed cleanup
        id: verify
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
          LABEL_EVENT_ID: ${{ steps.mutate.outputs.label_event_id }}
          LABEL_EVENT_CREATED_AT: ${{ steps.mutate.outputs.label_event_created_at }}
          BASELINE_GUARD_RUN_IDS: ${{ steps.preflight.outputs.guard_run_ids }}
          BASELINE_LLM_API_RUN_IDS: ${{ steps.preflight.outputs.llm_api_run_ids }}
        run: |
          set -euo pipefail

          expected_comment="Removed the \"$APPROVAL_LABEL\" label because @$EXPECTED_ACTOR could not be verified as an active member of NVIDIA/trt-llm-ci-approvers. Ask a member of that team to apply it."
          verified=false
          guard_run=''
          llm_api_run=''
          denial_comment=''

          for _attempt in $(seq 1 60); do
            issue="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR")"
            events="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100")"
            comments="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/comments?per_page=100")"
            runs="$(
              gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$GUARD_WORKFLOW_ID/runs?event=pull_request_target&per_page=100"
            )"
            llm_api_runs="$(
              gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$LLM_API_WORKFLOW_ID/runs?event=pull_request&per_page=100"
            )"

            label_present="$(
              jq --arg label "$APPROVAL_LABEL" \
                '[.labels[].name] | index($label) != null' <<<"$issue"
            )"
            label_event="$(
              jq -c \
                --argjson event_id "$LABEL_EVENT_ID" \
                --arg actor "$EXPECTED_ACTOR" \
                --argjson actor_id "$EXPECTED_ACTOR_ID" \
                '[.[] | select(.id == $event_id and .event == "labeled" and
                  .actor.login == $actor and .actor.id == $actor_id)] | first // empty' \
                <<<"$events"
            )"
            denial_candidates="$(
              jq -c \
                --arg body "$expected_comment" \
                --argjson bot_id "$GITHUB_ACTIONS_BOT_ID" \
                --arg since "$LABEL_EVENT_CREATED_AT" \
                '[.[] | select(.user.login == "github-actions[bot]" and
                  .user.id == $bot_id and .body == $body and .created_at >= $since)]' \
                <<<"$comments"
            )"
            run_candidates="$(
              jq -c \
                --argjson workflow_id "$GUARD_WORKFLOW_ID" \
                --arg path "$GUARD_WORKFLOW_PATH" \
                --arg actor "$EXPECTED_ACTOR" \
                --argjson actor_id "$EXPECTED_ACTOR_ID" \
                --arg title "$TARGET_PR_TITLE" \
                --arg since "$LABEL_EVENT_CREATED_AT" \
                --argjson baseline "$BASELINE_GUARD_RUN_IDS" \
                --arg head_ref "$TARGET_HEAD_REF" \
                --arg head_sha "$TARGET_HEAD_SHA" \
                --argjson head_repo_id "$TARGET_HEAD_REPOSITORY_ID" \
                --argjson base_repo_id "$TARGET_BASE_REPOSITORY_ID" \
                '[.workflow_runs[] | select(
                  (.id as $id | $baseline | index($id) == null) and
                  .workflow_id == $workflow_id and .path == $path and
                  .name == "Guard Post-Merge Approval Label" and
                  .display_title == $title and .event == "pull_request_target" and
                  .head_branch == $head_ref and .head_sha == $head_sha and
                  .head_repository.id == $head_repo_id and
                  .repository.id == $base_repo_id and
                  .actor.login == $actor and .actor.id == $actor_id and
                  .triggering_actor.login == $actor and .triggering_actor.id == $actor_id and
                  .run_attempt == 1 and .created_at >= $since
                )]' \
                <<<"$runs"
            )"
            llm_api_candidates="$(
              jq -c \
                --argjson workflow_id "$LLM_API_WORKFLOW_ID" \
                --arg path "$LLM_API_WORKFLOW_PATH" \
                --arg actor "$EXPECTED_ACTOR" \
                --argjson actor_id "$EXPECTED_ACTOR_ID" \
                --arg title "$TARGET_PR_TITLE" \
                --arg since "$LABEL_EVENT_CREATED_AT" \
                --argjson baseline "$BASELINE_LLM_API_RUN_IDS" \
                --arg head_ref "$TARGET_HEAD_REF" \
                --arg head_sha "$TARGET_HEAD_SHA" \
                --argjson head_repo_id "$TARGET_HEAD_REPOSITORY_ID" \
                --argjson base_repo_id "$TARGET_BASE_REPOSITORY_ID" \
                '[.workflow_runs[] | select(
                  (.id as $id | $baseline | index($id) == null) and
                  .workflow_id == $workflow_id and .path == $path and
                  .name == "LLM API Compatibility" and
                  .display_title == $title and .event == "pull_request" and
                  .head_branch == $head_ref and .head_sha == $head_sha and
                  .head_repository.id == $head_repo_id and
                  .repository.id == $base_repo_id and
                  .actor.login == $actor and .actor.id == $actor_id and
                  .triggering_actor.login == $actor and .triggering_actor.id == $actor_id and
                  .run_attempt == 1 and .created_at >= $since
                )]' \
                <<<"$llm_api_runs"
            )"

            if [[ "$label_present" == "false" && -n "$label_event" &&
                  "$(jq 'length' <<<"$denial_candidates")" == "1" &&
                  "$(jq 'length' <<<"$run_candidates")" == "1" &&
                  "$(jq 'length' <<<"$llm_api_candidates")" == "1" ]]; then
              denial_comment="$(jq -c '.[0]' <<<"$denial_candidates")"
              guard_run="$(jq -c '.[0]' <<<"$run_candidates")"
              llm_api_run="$(jq -c '.[0]' <<<"$llm_api_candidates")"
              run_status="$(jq -r '.status' <<<"$guard_run")"
              run_conclusion="$(jq -r '.conclusion // ""' <<<"$guard_run")"
              llm_status="$(jq -r '.status' <<<"$llm_api_run")"
              llm_conclusion="$(jq -r '.conclusion // ""' <<<"$llm_api_run")"
              if [[ "$run_status" == "completed" && "$run_conclusion" == "success" &&
                    "$llm_status" == "completed" && "$llm_conclusion" == "success" ]]; then
                verified=true
                break
              fi
              if [[ "$run_status" == "completed" && "$run_conclusion" != "success" ]] ||
                 [[ "$llm_status" == "completed" && "$llm_conclusion" != "success" ]]; then
                break
              fi
            fi
            sleep 5
          done

          [[ "$verified" == "true" ]]
          guard_run_id="$(jq -r '.id' <<<"$guard_run")"
          guard_run_url="$(jq -r '.html_url' <<<"$guard_run")"
          llm_api_run_id="$(jq -r '.id' <<<"$llm_api_run")"
          llm_api_run_url="$(jq -r '.html_url' <<<"$llm_api_run")"
          denial_comment_id="$(jq -r '.id' <<<"$denial_comment")"
          denial_comment_url="$(jq -r '.html_url' <<<"$denial_comment")"
          denial_comment_created_at="$(jq -r '.created_at' <<<"$denial_comment")"

          final_events="$(
            gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100"
          )"
          unlabeled_candidates="$(
            jq -c \
              --arg label "$APPROVAL_LABEL" \
              --argjson bot_id "$GITHUB_ACTIONS_BOT_ID" \
              --arg since "$LABEL_EVENT_CREATED_AT" \
              '[.[] | select(.event == "unlabeled" and .label.name == $label and
                .actor.login == "github-actions[bot]" and .actor.id == $bot_id and
                .created_at >= $since)]' <<<"$final_events"
          )"
          jq -e 'length == 1' <<<"$unlabeled_candidates" >/dev/null
          unlabeled_event="$(jq -c '.[0]' <<<"$unlabeled_candidates")"

          final_comments="$(
            gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/comments?per_page=100"
          )"
          jq -e \
            --argjson comment_id "$denial_comment_id" \
            'length == 1 and .[0].id == $comment_id' \
            <<<"$final_comments" >/dev/null

          jobs="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/runs/$guard_run_id/jobs?per_page=100"
          )"
          jq -e '
            .total_count == 1 and (.jobs | length) == 1 and
            .jobs[0].name == "guard-post-merge-approval" and
            .jobs[0].status == "completed" and .jobs[0].conclusion == "success"
          ' <<<"$jobs" >/dev/null
          jq -e '
            [.jobs[0].steps[] | select(.name == "Validate post-merge approver" and
              .status == "completed" and .conclusion == "success")] | length == 1
          ' <<<"$jobs" >/dev/null
          jq -e '
            [.jobs[0].steps[] | select(.name == "Clear unauthorized post-merge approval" and
              .status == "completed" and .conclusion == "success")] | length == 1
          ' <<<"$jobs" >/dev/null

          guard_job_id="$(jq -r '.jobs[0].id' <<<"$jobs")"
          guard_log="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/jobs/$guard_job_id/logs"
          )"
          grep -Fq "$EXPECTED_ACTOR is not an active member of NVIDIA/trt-llm-ci-approvers." \
            <<<"$guard_log"
          printf '%s\n' \
            "$EXPECTED_ACTOR is not an active member of NVIDIA/trt-llm-ci-approvers." \
            > "$AUDIT_DIR/guard-nonmember-marker.txt"

          llm_jobs="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/runs/$llm_api_run_id/jobs?per_page=100"
          )"
          jq -e '
            .total_count == 1 and (.jobs | length) == 1 and
            .jobs[0].name == "Check LLM API Compatibility Label" and
            .jobs[0].status == "completed" and .jobs[0].conclusion == "success" and
            ([.jobs[0].steps[] | select(.name == "Validate LLM API compatibility label" and
              .status == "completed" and .conclusion == "success")] | length == 1)
          ' <<<"$llm_jobs" >/dev/null

          global_runs="$(
            gh api "/repos/$TARGET_REPOSITORY/actions/runs?actor=$EXPECTED_ACTOR&per_page=100"
          )"
          new_global_runs="$(
            jq -c \
              --arg since "$LABEL_EVENT_CREATED_AT" \
              --argjson actor_id "$EXPECTED_ACTOR_ID" \
              '[.workflow_runs[] | select(
                .actor.id == $actor_id and .created_at >= $since)]' \
              <<<"$global_runs"
          )"
          jq -e \
            --argjson guard_id "$guard_run_id" \
            --argjson llm_id "$llm_api_run_id" \
            'length == 2 and ([.[].id] | sort) == ([$guard_id,$llm_id] | sort)' \
            <<<"$new_global_runs" >/dev/null

          observed_guard_blob="$(
            gh api "/repos/$TARGET_REPOSITORY/contents/$GUARD_WORKFLOW_PATH?ref=main" --jq '.sha'
          )"
          [[ "$observed_guard_blob" == "$GUARD_WORKFLOW_BLOB_SHA" ]]

          printf '%s\n' \
            "guard_run_id=$guard_run_id" \
            "guard_run_url=$guard_run_url" \
            "llm_api_run_id=$llm_api_run_id" \
            "llm_api_run_url=$llm_api_run_url" \
            "denial_comment_id=$denial_comment_id" \
            "denial_comment_url=$denial_comment_url" \
            "denial_comment_created_at=$denial_comment_created_at" \
            >> "$GITHUB_OUTPUT"
          jq '{id,name,path,event,status,conclusion,actor,triggering_actor,
            head_branch,head_sha,run_attempt,created_at,updated_at,html_url}' \
            <<<"$guard_run" > "$AUDIT_DIR/guard-run.json"
          jq '{id,user:{login:.user.login,id:.user.id,type:.user.type},body,created_at,html_url}' \
            <<<"$denial_comment" > "$AUDIT_DIR/denial-comment.json"
          jq '{id,event,actor:{login:.actor.login,id:.actor.id,type:.actor.type},label,created_at}' \
            <<<"$unlabeled_event" > "$AUDIT_DIR/unlabeled-event.json"
          jq '{total_count,jobs:[.jobs[] | {id,name,status,conclusion,started_at,
            completed_at,html_url,steps:[.steps[] | {name,status,conclusion,number,
            started_at,completed_at}]}]}' <<<"$jobs" > "$AUDIT_DIR/guard-jobs.json"
          jq '{id,name,path,event,status,conclusion,actor,triggering_actor,
            head_branch,head_sha,run_attempt,created_at,updated_at,html_url}' \
            <<<"$llm_api_run" > "$AUDIT_DIR/llm-api-run.json"
          jq '{total_count,jobs:[.jobs[] | {id,name,status,conclusion,started_at,
            completed_at,html_url,steps:[.steps[] | {name,status,conclusion,number,
            started_at,completed_at}]}]}' <<<"$llm_jobs" > "$AUDIT_DIR/llm-api-jobs.json"
          jq '[.[] | {id,workflow_id,name,path,event,status,conclusion,actor,
            triggering_actor,created_at,html_url}]' <<<"$new_global_runs" \
            > "$AUDIT_DIR/new-upstream-runs.json"

      - name: Verify recursive workflow suppression
        id: recursion
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
          DENIAL_COMMENT_CREATED_AT: ${{ steps.verify.outputs.denial_comment_created_at }}
          BASELINE_BLOSSOM_RUN_IDS: ${{ steps.preflight.outputs.blossom_run_ids }}
          BASELINE_BOT_RUN_IDS: ${{ steps.preflight.outputs.bot_run_ids }}
        run: |
          set -euo pipefail

          sleep 60
          for spec in \
            "blossom|$BLOSSOM_WORKFLOW_ID|$BLOSSOM_WORKFLOW_PATH|$BASELINE_BLOSSOM_RUN_IDS" \
            "bot|$BOT_WORKFLOW_ID|$BOT_WORKFLOW_PATH|$BASELINE_BOT_RUN_IDS"; do
            IFS='|' read -r name workflow_id workflow_path baseline_ids <<<"$spec"
            workflow="$(gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$workflow_id")"
            jq -e \
              --argjson id "$workflow_id" \
              --arg path "$workflow_path" \
              '.id == $id and .path == $path and .state == "active"' \
              <<<"$workflow" >/dev/null

            runs="$(
              gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$workflow_id/runs?event=issue_comment&per_page=100"
            )"
            candidates="$(
              jq -c \
                --argjson baseline "$baseline_ids" \
                --argjson bot_id "$GITHUB_ACTIONS_BOT_ID" \
                --arg since "$DENIAL_COMMENT_CREATED_AT" \
                '[.workflow_runs[] | select(
                  (.id as $id | $baseline | index($id) == null) and
                  .actor.login == "github-actions[bot]" and .actor.id == $bot_id and
                  .event == "issue_comment" and .created_at >= $since
                )]' <<<"$runs"
            )"
            jq -e 'length == 0' <<<"$candidates" >/dev/null
            jq -n \
              --arg workflow "$name" \
              --argjson baseline_ids "$baseline_ids" \
              --argjson recursive_candidates "$candidates" \
              '{workflow:$workflow,baseline_ids:$baseline_ids,
                recursive_candidates:$recursive_candidates}' \
              > "$AUDIT_DIR/${name}-recursive-runs.json"
          done

          {
            echo "## TRTLLMINF-188 upstream negative E2E"
            echo
            echo "- Actor: \`$EXPECTED_ACTOR\` (ID $EXPECTED_ACTOR_ID, role \`triage\`)"
            echo "- Target: https://github.com/$TARGET_REPOSITORY/pull/$TARGET_PR"
            echo "- Guard: ${{ steps.verify.outputs.guard_run_url }}"
            echo "- Expected label-side check: ${{ steps.verify.outputs.llm_api_run_url }}"
            echo "- Denial comment: ${{ steps.verify.outputs.denial_comment_url }}"
            echo "- Approval label removed: yes"
            echo "- Recursive Blossom-CI/Bot-Command runs observed in the 60-second window: none"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emergency-remove only the bound test label
        id: cleanup
        if: always() && steps.mutate.outputs.mutation_attempted == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
          MUTATION_AT: ${{ steps.mutate.outputs.mutation_at }}
          BOUND_LABEL_EVENT_ID: ${{ steps.mutate.outputs.label_event_id }}
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_DIR"
          emergency_cleanup=false
          delete_succeeded=false
          concurrent_absence=false

          labels="$(
            gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/labels?per_page=100"
          )"
          if jq -e --arg label "$APPROVAL_LABEL" \
            '[.[].name] | index($label) != null' <<<"$labels" >/dev/null; then
            emergency_cleanup=true
            latest_event=''
            for _attempt in $(seq 1 30); do
              events="$(gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100")"
              latest_event="$(
                jq -c \
                  --arg label "$APPROVAL_LABEL" \
                  '[.[] | select(.event == "labeled" and
                    (.label.name | ascii_downcase) == ($label | ascii_downcase))] |
                    last // empty' <<<"$events"
              )"
              [[ -n "$latest_event" ]] && break
              sleep 1
            done
            [[ -n "$latest_event" ]]

            if [[ -n "$BOUND_LABEL_EVENT_ID" ]]; then
              [[ "$(jq -r '.id' <<<"$latest_event")" == "$BOUND_LABEL_EVENT_ID" ]]
            else
              jq -e \
                --arg actor "$EXPECTED_ACTOR" \
                --argjson actor_id "$EXPECTED_ACTOR_ID" \
                --arg since "$MUTATION_AT" \
                --argjson baseline "$BASELINE_LABELED_EVENT_ID" \
                '.id != $baseline and .actor.login == $actor and .actor.id == $actor_id and
                 .actor.type == "User" and .created_at >= $since' \
                <<<"$latest_event" >/dev/null
            fi

            pr="$(gh api "/repos/$TARGET_REPOSITORY/pulls/$TARGET_PR")"
            jq -e \
              --argjson id "$TARGET_PR_ID" \
              '.id == $id and .state == "closed" and .merged == false and .draft == true' \
              <<<"$pr" >/dev/null
            llm_before_cleanup="$(
              gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$LLM_API_WORKFLOW_ID/runs?event=pull_request&per_page=100"
            )"
            cleanup_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +e
            delete_response="$(
              gh api --include --silent --method DELETE \
                "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/labels/ci%3A%20post-merge%20approved" \
                2>&1
            )"
            delete_status=$?
            set -e
            if [[ "$delete_status" -eq 0 ]]; then
              delete_succeeded=true
            else
              grep -q 'HTTP 404' <<<"$delete_response"
              labels_after_delete="$(
                gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/labels?per_page=100"
              )"
              jq -e --arg label "$APPROVAL_LABEL" \
                '[.[].name] | index($label) == null' \
                <<<"$labels_after_delete" >/dev/null
              concurrent_absence=true
            fi

            if [[ "$delete_succeeded" == "true" ]]; then
              emergency_llm_run=''
              for _attempt in $(seq 1 60); do
                llm_after_cleanup="$(
                  gh api "/repos/$TARGET_REPOSITORY/actions/workflows/$LLM_API_WORKFLOW_ID/runs?event=pull_request&per_page=100"
                )"
                emergency_candidates="$(
                  jq -c \
                    --argjson baseline "$(jq -c '[.workflow_runs[].id]' <<<"$llm_before_cleanup")" \
                    --argjson workflow_id "$LLM_API_WORKFLOW_ID" \
                    --arg path "$LLM_API_WORKFLOW_PATH" \
                    --arg actor "$EXPECTED_ACTOR" \
                    --argjson actor_id "$EXPECTED_ACTOR_ID" \
                    --arg since "$cleanup_at" \
                    --arg head_ref "$TARGET_HEAD_REF" \
                    --arg head_sha "$TARGET_HEAD_SHA" \
                    '[.workflow_runs[] | select(
                      (.id as $id | $baseline | index($id) == null) and
                      .workflow_id == $workflow_id and .path == $path and
                      .event == "pull_request" and .actor.login == $actor and
                      .actor.id == $actor_id and .head_branch == $head_ref and
                      .head_sha == $head_sha and .created_at >= $since)]' \
                    <<<"$llm_after_cleanup"
                )"
                if [[ "$(jq 'length' <<<"$emergency_candidates")" == "1" ]]; then
                  emergency_llm_run="$(jq -c '.[0]' <<<"$emergency_candidates")"
                  if [[ "$(jq -r '.status' <<<"$emergency_llm_run")" == "completed" ]]; then
                    break
                  fi
                fi
                sleep 2
              done
              [[ -n "$emergency_llm_run" ]]
              jq -e '.status == "completed" and .conclusion == "success"' \
                <<<"$emergency_llm_run" >/dev/null
              jq '{id,workflow_id,name,path,event,status,conclusion,actor,
                triggering_actor,head_branch,head_sha,created_at,html_url}' \
                <<<"$emergency_llm_run" > "$AUDIT_DIR/emergency-llm-api-run.json"
            fi
          fi

          labels_after="$(
            gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/labels?per_page=100"
          )"
          label_present_after="$(
            jq --arg label "$APPROVAL_LABEL" \
              '[.[].name] | index($label) != null' <<<"$labels_after"
          )"
          [[ "$label_present_after" == "false" ]]
          jq -n \
            --argjson emergency_cleanup "$emergency_cleanup" \
            --argjson delete_succeeded "$delete_succeeded" \
            --argjson concurrent_absence "$concurrent_absence" \
            --argjson label_present_after "$label_present_after" \
            '{emergency_cleanup:$emergency_cleanup,delete_succeeded:$delete_succeeded,
              concurrent_absence:$concurrent_absence,
              label_present_after:$label_present_after}' \
            > "$AUDIT_DIR/emergency-cleanup.json"

      - name: Build sanitized audit bundle
        id: audit
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.TRTLLM_AGENT_SHARED_TOKEN }}
          GUARD_RUN_ID: ${{ steps.verify.outputs.guard_run_id }}
          LLM_API_RUN_ID: ${{ steps.verify.outputs.llm_api_run_id }}
          LABEL_EVENT_ID: ${{ steps.mutate.outputs.label_event_id }}
          DENIAL_COMMENT_ID: ${{ steps.verify.outputs.denial_comment_id }}
          PREFLIGHT_OUTCOME: ${{ steps.preflight.outcome }}
          MUTATE_OUTCOME: ${{ steps.mutate.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          RECURSION_OUTCOME: ${{ steps.recursion.outcome }}
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_DIR"

          gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR" |
            jq '{number,state,comments,labels:[.labels[].name],updated_at,closed_at,html_url}' \
            > "$AUDIT_DIR/pr-readback.json"
          gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/events?per_page=100" |
            jq '[.[] | {id,event,actor:{login:.actor.login,id:.actor.id,type:.actor.type},
              label:.label.name,created_at}]' > "$AUDIT_DIR/events-readback.json"
          gh api "/repos/$TARGET_REPOSITORY/issues/$TARGET_PR/comments?per_page=100" |
            jq '[.[] | {id,user:{login:.user.login,id:.user.id,type:.user.type},
              body,created_at,html_url}]' > "$AUDIT_DIR/comments-readback.json"
          if [[ -n "$GUARD_RUN_ID" ]]; then
            gh api "/repos/$TARGET_REPOSITORY/actions/runs/$GUARD_RUN_ID/jobs?per_page=100" |
              jq '{total_count,jobs:[.jobs[] | {id,name,status,conclusion,started_at,
                completed_at,html_url,steps:[.steps[] | {name,status,conclusion,number,
                started_at,completed_at}]}]}' > "$AUDIT_DIR/guard-jobs-readback.json"
          fi
          if [[ -n "$LLM_API_RUN_ID" ]]; then
            gh api "/repos/$TARGET_REPOSITORY/actions/runs/$LLM_API_RUN_ID/jobs?per_page=100" |
              jq '{total_count,jobs:[.jobs[] | {id,name,status,conclusion,started_at,
                completed_at,html_url,steps:[.steps[] | {name,status,conclusion,number,
                started_at,completed_at}]}]}' > "$AUDIT_DIR/llm-api-jobs-readback.json"
          fi

          jq -n \
            --arg actor "$EXPECTED_ACTOR" \
            --argjson actor_id "$EXPECTED_ACTOR_ID" \
            --arg guard_run_id "$GUARD_RUN_ID" \
            --arg llm_api_run_id "$LLM_API_RUN_ID" \
            --arg label_event_id "$LABEL_EVENT_ID" \
            --arg denial_comment_id "$DENIAL_COMMENT_ID" \
            --arg preflight "$PREFLIGHT_OUTCOME" \
            --arg mutate "$MUTATE_OUTCOME" \
            --arg verify "$VERIFY_OUTCOME" \
            --arg recursion "$RECURSION_OUTCOME" \
            --arg cleanup "$CLEANUP_OUTCOME" \
            '{actor:$actor,actor_id:$actor_id,
              evidence:{guard_run_id:$guard_run_id,llm_api_run_id:$llm_api_run_id,
                label_event_id:$label_event_id,
                denial_comment_id:$denial_comment_id},
              steps:{preflight:$preflight,mutate:$mutate,verify:$verify,
                recursion:$recursion,cleanup:$cleanup}}' \
            > "$AUDIT_DIR/result.json"

          if grep -R -q -E -- \
            '-----BEGIN ([A-Z]+ )?PRIVATE KEY-----|github_pat_|gh[pousr]_[A-Za-z0-9]{20,}|Bearer[[:space:]]+[A-Za-z0-9._-]{20,}' \
            "$AUDIT_DIR"; then
            echo "Credential-pattern scan rejected the audit bundle." >&2
            exit 1
          fi
          (cd "$AUDIT_DIR" && sha256sum * > SHA256SUMS)
          printf '%s\n' 'safe=true' >> "$GITHUB_OUTPUT"

      - name: Upload sanitized audit bundle
        if: always() && steps.audit.outputs.safe == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trtllminf-188-shared-token-negative-e2e-${{ github.run_id }}
          path: /tmp/trtllminf-188-shared-token-negative-e2e
          if-no-files-found: error
          retention-days: 30
